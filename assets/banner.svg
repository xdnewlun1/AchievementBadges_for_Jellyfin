<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="red1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="goldBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Red glow behind trophy -->
  <ellipse cx="600" cy="240" rx="300" ry="220" fill="url(#glow1)"/>

  <!-- Top red line -->
  <rect width="1200" height="4" fill="url(#red1)"/>

  <!-- Trophy -->
  <g transform="translate(600,220)">
    <path d="M-50,-80 L-50,-115 L50,-115 L50,-80 C50,-28 28,12 0,28 C-28,12 -50,-28 -50,-80Z" fill="url(#gold)"/>
    <rect x="-52" y="-117" width="104" height="7" rx="3" fill="#fde68a"/>
    <path d="M-50,-75 C-78,-75 -88,-48 -78,-24 C-73,-16 -58,-20 -50,-32" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <path d="M50,-75 C78,-75 88,-48 78,-24 C73,-16 58,-20 50,-32" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <polygon points="0,-82 7,-64 24,-64 10,-52 16,-34 0,-46 -16,-34 -10,-52 -24,-64 -7,-64" fill="#92400e" opacity="0.45"/>
    <rect x="-7" y="28" width="14" height="26" rx="3" fill="url(#goldBase)"/>
    <rect x="-28" y="54" width="56" height="10" rx="4" fill="url(#goldBase)"/>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">Achievement Badges</text>

  <!-- Red subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#ef4444" letter-spacing="10">FOR JELLYFIN</text>

  <!-- Separator -->
  <rect x="500" y="400" width="200" height="1" fill="#dc2626" opacity="0.3"/>

  <!-- Tagline -->
  <text x="600" y="435" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#555" letter-spacing="3" font-weight="500">49 BADGES  ·  6 RARITIES  ·  LEADERBOARDS  ·  STREAKS</text>

  <!-- Rarity dots -->
  <g transform="translate(600,490)" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700">
    <circle cx="-200" cy="0" r="4" fill="#6b7280"/><text x="-200" y="18" fill="#6b7280">COMMON</text>
    <circle cx="-120" cy="0" r="4" fill="#34d399"/><text x="-120" y="18" fill="#34d399">UNCOMMON</text>
    <circle cx="-40" cy="0" r="4" fill="#60a5fa"/><text x="-40" y="18" fill="#60a5fa">RARE</text>
    <circle cx="40" cy="0" r="4" fill="#a78bfa"/><text x="40" y="18" fill="#a78bfa">EPIC</text>
    <circle cx="120" cy="0" r="4" fill="#fbbf24"/><text x="120" y="18" fill="#fbbf24">LEGENDARY</text>
    <circle cx="200" cy="0" r="4" fill="#ef4444"/><text x="200" y="18" fill="#ef4444">MYTHIC</text>
  </g>

  <!-- Bottom info -->
  <text x="600" y="560" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#dc2626" opacity="0.4" font-weight="600" letter-spacing="2">JELLYFIN 10.11+ PLUGIN</text>

  <!-- Bottom red line -->
  <rect y="596" width="1200" height="4" fill="url(#red1)"/>
</svg>
