<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Top red line -->
  <rect width="1200" height="4" fill="url(#redLine)"/>
  <!-- Bottom red line -->
  <rect y="596" width="1200" height="4" fill="url(#redLine)"/>

  <!-- Corner brackets -->
  <!-- Top left -->
  <line x1="50" y1="45" x2="50" y2="100" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <line x1="50" y1="45" x2="105" y2="45" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <!-- Top right -->
  <line x1="1150" y1="45" x2="1150" y2="100" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <line x1="1150" y1="45" x2="1095" y2="45" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <!-- Bottom left -->
  <line x1="50" y1="555" x2="50" y2="500" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <line x1="50" y1="555" x2="105" y2="555" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <!-- Bottom right -->
  <line x1="1150" y1="555" x2="1150" y2="500" stroke="#dc2626" stroke-width="3" opacity="0.7"/>
  <line x1="1150" y1="555" x2="1095" y2="555" stroke="#dc2626" stroke-width="3" opacity="0.7"/>

  <!-- Trophy icon -->
  <g transform="translate(340, 280)">
    <!-- Cup -->
    <path d="M-30,-45 L-30,-65 L30,-65 L30,-45 C30,-15 16,8 0,16 C-16,8 -30,-15 -30,-45Z" fill="#dc2626"/>
    <!-- Handles -->
    <path d="M-30,-42 C-46,-42 -52,-26 -46,-12 C-43,-7 -34,-10 -30,-18" fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
    <path d="M30,-42 C46,-42 52,-26 46,-12 C43,-7 34,-10 30,-18" fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
    <!-- Star -->
    <polygon points="0,-48 4,-38 14,-38 6,-31 9,-21 0,-28 -9,-21 -6,-31 -14,-38 -4,-38" fill="#1a1a1a" opacity="0.4"/>
    <!-- Stem -->
    <rect x="-5" y="16" width="10" height="16" rx="2" fill="#991b1b"/>
    <!-- Base -->
    <rect x="-18" y="32" width="36" height="7" rx="3" fill="#991b1b"/>
  </g>

  <!-- Main title - white with red shadow for glitch effect -->
  <text x="620" y="270" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="72" font-weight="900" fill="#dc2626" letter-spacing="8" opacity="0.6">ACHIEVEMENT</text>
  <text x="618" y="268" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="72" font-weight="900" fill="white" letter-spacing="8">ACHIEVEMENT</text>

  <text x="620" y="340" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="72" font-weight="900" fill="#dc2626" letter-spacing="8" opacity="0.6">BADGES</text>
  <text x="618" y="338" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="72" font-weight="900" fill="white" letter-spacing="8">BADGES</text>

  <!-- Subtitle -->
  <text x="618" y="400" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" fill="#666" letter-spacing="12" font-weight="400">F O R   J E L L Y F I N</text>

  <!-- Rarity bar -->
  <g transform="translate(600, 480)" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700">
    <circle cx="-200" cy="0" r="4" fill="#6b7280"/><text x="-200" y="18" fill="#6b7280">COMMON</text>
    <circle cx="-120" cy="0" r="4" fill="#34d399"/><text x="-120" y="18" fill="#34d399">UNCOMMON</text>
    <circle cx="-40" cy="0" r="4" fill="#60a5fa"/><text x="-40" y="18" fill="#60a5fa">RARE</text>
    <circle cx="40" cy="0" r="4" fill="#a78bfa"/><text x="40" y="18" fill="#a78bfa">EPIC</text>
    <circle cx="120" cy="0" r="4" fill="#fbbf24"/><text x="120" y="18" fill="#fbbf24">LEGENDARY</text>
    <circle cx="200" cy="0" r="4" fill="#ef4444"/><text x="200" y="18" fill="#ef4444">MYTHIC</text>
  </g>

  <!-- Bottom text -->
  <text x="600" y="555" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#444" letter-spacing="3" font-weight="600">JELLYFIN 10.11+ PLUGIN</text>
</svg>
