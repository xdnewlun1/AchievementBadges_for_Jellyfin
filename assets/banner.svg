<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 140" width="620" height="140" role="img" aria-label="Achievement Badges for Jellyfin">
  <defs>
    <!-- Subtle vertical sheen on the banner so it's not a flat block -->
    <linearGradient id="bannerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#254ea8"/>
      <stop offset="55%"  stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#162c6b"/>
    </linearGradient>

    <!-- Rim highlight / bottom shadow overlay -->
    <linearGradient id="bannerRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="38%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="62%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
  </defs>

  <!-- Rounded pill banner -->
  <rect x="8" y="14" width="604" height="112" rx="56" ry="56" fill="url(#bannerFill)"/>
  <rect x="8" y="14" width="604" height="112" rx="56" ry="56" fill="url(#bannerRim)" pointer-events="none"/>

  <!-- Trophy icon (white, centered at left) -->
  <g transform="translate(78, 70)" fill="#ffffff">
    <!-- cup body -->
    <path d="M -18,-24 L -18,-28 L 18,-28 L 18,-24 C 18,-9 11,5 0,11 C -11,5 -18,-9 -18,-24 Z"/>
    <!-- handles -->
    <path d="M -18,-22 C -26,-22 -29,-14 -25,-6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 18,-22 C 26,-22 29,-14 25,-6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <!-- stem + base -->
    <rect x="-3.5" y="11" width="7" height="7"/>
    <rect x="-12" y="18" width="24" height="4" rx="1.5"/>
  </g>

  <!-- Text block -->
  <g font-family="'Segoe UI','Helvetica Neue',system-ui,sans-serif" fill="#ffffff">
    <!-- Gamerscore G badge (circle with G inside) -->
    <g transform="translate(148, 58)">
      <circle r="13" fill="rgba(255,255,255,0.16)" stroke="#ffffff" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="17" font-weight="900">G</text>
    </g>

    <!-- Top line: "100 - Achievement Badges" -->
    <text x="170" y="65" font-size="24" font-weight="800" letter-spacing="0.3">100 – Achievement Badges</text>

    <!-- Bottom line: "Badges for Jellyfin" -->
    <text x="148" y="96" font-size="17" font-weight="500" opacity="0.88" letter-spacing="0.2">Unlockable viewing achievements for Jellyfin</text>
  </g>
</svg>
